name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.248.246.43
          username: yatri
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/bin:$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:/opt/cpanel/composer/bin:$PATH"
            [ -f "$HOME/.bashrc" ] && . "$HOME/.bashrc" || true
            [ -f "$HOME/.profile" ] && . "$HOME/.profile" || true

            find_cmd() {
              for cmd in "$@"; do
                if command -v "$cmd" >/dev/null 2>&1; then
                  command -v "$cmd"
                  return 0
                fi
                if [ -x "$cmd" ]; then
                  printf '%s\n' "$cmd"
                  return 0
                fi
              done
              return 1
            }

            PHP_BIN="$(find_cmd php php82 php81 php80 /usr/local/bin/php /opt/cpanel/ea-php82/root/usr/bin/php /opt/cpanel/ea-php81/root/usr/bin/php)"
            COMPOSER_BIN="$(find_cmd composer composer2 /usr/local/bin/composer /opt/cpanel/composer/bin/composer "$HOME/bin/composer" "$HOME/.local/bin/composer")"

            cd ~/htdocs/yatri.org
            git pull origin main
            "$COMPOSER_BIN" install --no-dev --optimize-autoloader --no-interaction
            "$PHP_BIN" artisan migrate --force
            "$PHP_BIN" artisan storage:link || true
            "$PHP_BIN" artisan config:cache
            "$PHP_BIN" artisan route:cache
            "$PHP_BIN" artisan view:cache
            "$PHP_BIN" artisan queue:restart || true

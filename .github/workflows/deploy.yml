name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROD_DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}
          PROD_DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
        with:
          host: 155.248.246.43
          username: yatri
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: PROD_DB_DATABASE,PROD_DB_USERNAME,PROD_DB_PASSWORD
          script: |
            set -e
            export PATH="$HOME/bin:$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:/opt/cpanel/composer/bin:$PATH"
            [ -f "$HOME/.bashrc" ] && . "$HOME/.bashrc" || true
            [ -f "$HOME/.profile" ] && . "$HOME/.profile" || true

            find_cmd() {
              for cmd in "$@"; do
                if command -v "$cmd" >/dev/null 2>&1; then
                  command -v "$cmd"
                  return 0
                fi
                if [ -x "$cmd" ]; then
                  printf '%s\n' "$cmd"
                  return 0
                fi
              done
              return 1
            }

            set_env() {
              key="$1"
              value="$2"
              file=".env"
              escaped="$(printf '%s' "$value" | sed 's/[\/&]/\\&/g')"

              if grep -q "^${key}=" "$file"; then
                sed -i "s/^${key}=.*/${key}=${escaped}/" "$file"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            PHP_BIN="$(find_cmd php php82 php81 php80 /usr/local/bin/php /opt/cpanel/ea-php82/root/usr/bin/php /opt/cpanel/ea-php81/root/usr/bin/php)"
            COMPOSER_BIN="$(find_cmd composer composer2 /usr/local/bin/composer /opt/cpanel/composer/bin/composer "$HOME/bin/composer" "$HOME/.local/bin/composer")"

            cd ~/htdocs/yatri.org
            git stash --quiet || true
            git pull origin main
            [ -f .env ] || cp .env.example .env
            set_env APP_ENV production
            set_env APP_DEBUG false
            set_env APP_URL https://yatri.org
            set_env ASSET_URL https://yatri.org/public
            set_env DB_CONNECTION mysql
            set_env DB_HOST 127.0.0.1
            set_env DB_PORT 3306
            set_env DB_DATABASE "$PROD_DB_DATABASE"
            set_env DB_USERNAME "$PROD_DB_USERNAME"
            set_env DB_PASSWORD "$PROD_DB_PASSWORD"
            ln -sfn public/css css
            ln -sfn public/favicon.ico favicon.ico
            ln -sfn public/robots.txt robots.txt
            "$COMPOSER_BIN" install --no-dev --optimize-autoloader --no-interaction
            grep -q '^APP_KEY=base64:' .env || "$PHP_BIN" artisan key:generate --force
            "$PHP_BIN" artisan migrate --force
            "$PHP_BIN" artisan storage:link || true
            "$PHP_BIN" artisan view:clear
            "$PHP_BIN" artisan route:clear
            "$PHP_BIN" artisan config:clear
            "$PHP_BIN" artisan cache:clear
            "$PHP_BIN" artisan config:cache
            "$PHP_BIN" artisan route:cache
            "$PHP_BIN" artisan view:cache
            "$PHP_BIN" artisan queue:restart || true

name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.248.246.43
          username: yatri
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/htdocs/yatri.org
            git pull origin main
